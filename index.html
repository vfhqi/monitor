<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watson Token Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --border:    #2a2d3a;
    --text:      #e2e4ed;
    --muted:     #7b7f96;
    --accent:    #6c8aff;
    --green:     #3ecf8e;
    --amber:     #f59e0b;
    --red:       #f43f5e;
    --radius:    10px;
    --shadow:    0 2px 12px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; padding: 20px; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 12px; margin-bottom: 24px; }
  .grid { display: grid; gap: 16px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: 2fr 1fr; }
  @media (max-width: 900px) { .grid-4 { grid-template-columns: 1fr 1fr; } .grid-3, .grid-2 { grid-template-columns: 1fr; } }
  @media (max-width: 500px) { .grid-4 { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); }
  .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
  .big-num { font-size: 28px; font-weight: 700; line-height: 1; }
  .big-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .section-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: var(--text); }
  .chart-wrap { position: relative; height: 220px; }
  .chart-wrap-tall { position: relative; height: 280px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-red    { background: rgba(244,63,94,0.15);  color: var(--red);   }
  .badge-amber  { background: rgba(245,158,11,0.15); color: var(--amber); }
  .badge-green  { background: rgba(62,207,142,0.15); color: var(--green); }
  .badge-blue   { background: rgba(108,138,255,0.15);color: var(--accent);}
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 6px 10px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 7px 10px; border-bottom: 1px solid rgba(42,45,58,0.5); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(108,138,255,0.04); }
  .alert-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .alert-row:last-child { border-bottom: none; }
  .alert-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .alert-icon-red   { background: rgba(244,63,94,0.15); }
  .alert-icon-amber { background: rgba(245,158,11,0.15); }
  .alert-body { flex: 1; }
  .alert-title { font-weight: 600; font-size: 13px; }
  .alert-detail { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .delta-pos { color: var(--red); }
  .delta-neg { color: var(--green); }
  .loading { color: var(--muted); text-align: center; padding: 40px; font-size: 13px; }
  .error-box { background: rgba(244,63,94,0.08); border: 1px solid rgba(244,63,94,0.3); border-radius: var(--radius); padding: 16px; color: var(--red); font-size: 13px; }
  .refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .refresh-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .refresh-btn:hover { background: var(--border); }
  .stage1-bar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .stage1-side { flex: 1; min-width: 120px; }
  .stage1-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .stage1-val { font-size: 22px; font-weight: 700; }
  .stage1-arrow { font-size: 28px; color: var(--muted); }
  .progress-track { height: 6px; background: var(--border); border-radius: 3px; margin-top: 8px; }
  .progress-fill  { height: 6px; border-radius: 3px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-24 { margin-bottom: 24px; }
</style>
</head>
<body>

<div class="refresh-bar">
  <div>
    <h1>Watson Token Monitor</h1>
    <div class="subtitle" id="gen-time">Loading...</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">Refresh</button>
</div>

<div id="root"><div class="loading">Loading token data...</div></div>

<script>
const AGENT_LABELS = {
  pipeline_submission:     'Submission',
  pipeline_extraction:     'Extraction',
  pipeline_production:     'Production',
  pipeline_publishing:     'Publishing',
  pipeline_morning_routine:'Morning Routine',
  pipeline_eod_routine:    'EOD Routine',
  pipeline_memory_weekly:  'Memory Weekly',
  interactive_ia:          'Interactive IA',
  interactive_sa:          'Interactive SA',
  interactive_cos:         'Interactive CoS',
  other:                   'Other',
};
const AGENT_COLOURS = [
  '#6c8aff','#3ecf8e','#f59e0b','#f43f5e','#a78bfa',
  '#38bdf8','#fb923c','#4ade80','#f472b6','#34d399','#94a3b8',
];
const fmt2 = n => n != null ? n.toFixed(2) : '—';
const fmtPct = n => n != null ? (n > 0 ? '+' : '') + n.toFixed(1) + '%' : '—';
const pctClass = n => n == null ? '' : n > 0 ? 'delta-pos' : 'delta-neg';

let charts = {};
function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

async function loadData() {
  document.getElementById('gen-time').textContent = 'Loading...';
  try {
    const r = await fetch('token-summary.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    render(d);
  } catch(e) {
    document.getElementById('root').innerHTML = `
      <div class="error-box">
        <strong>Could not load token-summary.json</strong><br>
        ${e.message}<br><br>
        Make sure the Windows Task Scheduler job has run at least once, then push to GitHub Pages.
      </div>`;
    document.getElementById('gen-time').textContent = 'Load failed';
  }
}

function render(d) {
  destroyCharts();
  document.getElementById('gen-time').textContent = 'Updated: ' + new Date(d.generated_at).toLocaleString('en-GB');

  // --- KPI cards ---
  const s1 = d.stage1_comparison || {};
  const pct = s1.pct_change;
  const pctLabel = pct != null
    ? `<span class="${pctClass(pct)}">${fmtPct(pct)}</span> vs pre-Stage-1 avg`
    : 'Stage 1 pivot: ' + (s1.pivot_date || '—');

  const alerts = (d.loop_alerts || []).filter(a => a.severity === 'HIGH');
  const alertBadge = alerts.length
    ? `<span class="badge badge-red">${alerts.length} alert${alerts.length>1?'s':''}</span>`
    : `<span class="badge badge-green">No high alerts</span>`;

  // --- Daily chart data ---
  const dates = Object.keys(d.by_date || {}).sort().slice(-30);
  const dailyGbp = dates.map(dt => ((d.by_date[dt] || {}).cost_gbp || 0));
  const todayGbp = dailyGbp[dailyGbp.length - 1] || 0;

  // --- Agent breakdown ---
  const agents  = Object.keys(d.by_agent || {});
  const agentGbp = agents.map(a => (d.by_agent[a] || {}).cost_gbp || 0);

  // Stage 1 comparison values
  const beforeAvg = s1.before_daily_avg_usd || 0;
  const afterAvg  = s1.after_daily_avg_usd  || 0;
  const beforeGbp = (beforeAvg * (d.pricing_used?.usd_to_gbp || 0.79)).toFixed(2);
  const afterGbp  = (afterAvg  * (d.pricing_used?.usd_to_gbp || 0.79)).toFixed(2);
  const maxAvg = Math.max(beforeAvg, afterAvg, 0.001);
  const beforePct = Math.round(beforeAvg / maxAvg * 100);
  const afterPct  = Math.round(afterAvg  / maxAvg * 100);

  document.getElementById('root').innerHTML = `
    <!-- KPI cards -->
    <div class="grid grid-4 mb-24">
      <div class="card">
        <div class="card-title">Total spend (all time)</div>
        <div class="big-num">£${fmt2(d.total_cost_gbp)}</div>
        <div class="big-sub">$${fmt2(d.total_cost_usd)} USD</div>
      </div>
      <div class="card">
        <div class="card-title">Daily run rate (14d avg)</div>
        <div class="big-num">£${fmt2(d.avg_daily_gbp)}</div>
        <div class="big-sub">${pctLabel}</div>
      </div>
      <div class="card">
        <div class="card-title">Today</div>
        <div class="big-num">£${todayGbp.toFixed(2)}</div>
        <div class="big-sub">${dates[dates.length-1] || '—'}</div>
      </div>
      <div class="card">
        <div class="card-title">Loop alerts</div>
        <div class="big-num" style="font-size:22px;margin-top:4px">${alertBadge}</div>
        <div class="big-sub">${(d.loop_alerts||[]).length} total signals</div>
      </div>
    </div>

    <!-- Daily spend chart + agent breakdown -->
    <div class="grid grid-3 mb-16">
      <div class="card">
        <div class="section-title">Daily spend — last 30 days (£)</div>
        <div class="chart-wrap-tall"><canvas id="chart-daily"></canvas></div>
      </div>
      <div class="card">
        <div class="section-title">Spend by agent type</div>
        <div class="chart-wrap"><canvas id="chart-agent"></canvas></div>
      </div>
    </div>

    <!-- Stage 1 comparison + agent table -->
    <div class="grid grid-2 mb-16">
      <div class="card">
        <div class="section-title">Stage 1 Impact — daily average spend</div>
        <div class="stage1-bar">
          <div class="stage1-side">
            <div class="stage1-label">Before (${s1.before_days||'—'}d avg)</div>
            <div class="stage1-val">£${beforeGbp}</div>
            <div class="progress-track"><div class="progress-fill" style="width:${beforePct}%;background:var(--red)"></div></div>
          </div>
          <div class="stage1-arrow">→</div>
          <div class="stage1-side">
            <div class="stage1-label">After (${s1.after_days||'—'}d avg)</div>
            <div class="stage1-val ${pctClass(pct)}">£${afterGbp}</div>
            <div class="progress-track"><div class="progress-fill" style="width:${afterPct}%;background:${pct==null?'var(--accent)':pct<0?'var(--green)':'var(--red)'}"></div></div>
          </div>
        </div>
        ${pct != null ? `<div style="margin-top:16px;font-size:13px">Change: <span class="${pctClass(pct)}" style="font-weight:700">${fmtPct(pct)}</span> daily average</div>` : '<div style="margin-top:16px;font-size:12px;color:var(--muted)">Insufficient data for comparison yet — check back after a few days post-Stage-1.</div>'}
      </div>

      <div class="card">
        <div class="section-title">Spend by agent (all time)</div>
        <table>
          <thead><tr><th>Agent</th><th>£ GBP</th><th>% total</th></tr></thead>
          <tbody id="agent-table"></tbody>
        </table>
      </div>
    </div>

    <!-- Loop alerts -->
    <div class="card mb-16">
      <div class="section-title">Loop Alerts ${(d.loop_alerts||[]).length===0?'<span class="badge badge-green" style="font-size:11px">Clean</span>':''}</div>
      <div id="alerts-list">
        ${(d.loop_alerts||[]).length === 0
          ? '<div style="color:var(--muted);font-size:13px">No loop signals detected. All pipeline agents firing within expected thresholds.</div>'
          : ''}
      </div>
    </div>

    <!-- Recent sessions -->
    <div class="card">
      <div class="section-title">Recent sessions (top 20 by cost)</div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Session</th><th>Agent</th><th>Date</th><th>Turns</th><th>Tokens (k)</th><th>£ cost</th></tr></thead>
          <tbody id="sessions-table"></tbody>
        </table>
      </div>
    </div>
  `;

  // --- Daily chart ---
  const ctx1 = document.getElementById('chart-daily').getContext('2d');
  charts['daily'] = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: dates.map(d => d.slice(5)),
      datasets: [{
        label: '£ GBP',
        data: dailyGbp,
        backgroundColor: dates.map((dt, i) =>
          dt >= '2026-06-10' ? 'rgba(62,207,142,0.7)' : 'rgba(108,138,255,0.7)'
        ),
        borderRadius: 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => '£' + ctx.parsed.y.toFixed(3) } },
      },
      scales: {
        x: { ticks: { color: '#7b7f96', font: {size:10} }, grid: {color:'rgba(255,255,255,0.04)'} },
        y: { ticks: { color: '#7b7f96', callback: v => '£'+v.toFixed(2) }, grid: {color:'rgba(255,255,255,0.06)'} },
      }
    }
  });

  // Stage1 annotation (vertical line after pivot)
  const pivotIdx = dates.findIndex(dt => dt >= '2026-06-10');
  if (pivotIdx > 0) {
    document.getElementById('chart-daily').title = 'Blue = pre-Stage-1 | Green = post-Stage-1';
  }

  // --- Agent pie chart ---
  const ctx2 = document.getElementById('chart-agent').getContext('2d');
  charts['agent'] = new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: agents.map(a => AGENT_LABELS[a] || a),
      datasets: [{
        data: agentGbp,
        backgroundColor: AGENT_COLOURS.slice(0, agents.length),
        borderWidth: 1,
        borderColor: '#1a1d27',
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { color: '#e2e4ed', font: {size:11}, padding: 10, boxWidth: 12 } },
        tooltip: { callbacks: { label: ctx => `${ctx.label}: £${ctx.parsed.toFixed(3)}` } },
      },
      cutout: '60%',
    }
  });

  // --- Agent table ---
  const totalGbp = d.total_cost_gbp || 1;
  const agentRows = agents.map((a, i) => {
    const gbp = agentGbp[i];
    const pct = ((gbp / totalGbp) * 100).toFixed(1);
    const dot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${AGENT_COLOURS[i%AGENT_COLOURS.length]};margin-right:6px"></span>`;
    return `<tr><td>${dot}${AGENT_LABELS[a]||a}</td><td style="font-weight:600">£${gbp.toFixed(3)}</td><td style="color:var(--muted)">${pct}%</td></tr>`;
  });
  document.getElementById('agent-table').innerHTML = agentRows.join('');

  // --- Loop alerts list ---
  if ((d.loop_alerts||[]).length > 0) {
    const alertsHtml = d.loop_alerts.map(al => {
      const isHigh = al.severity === 'HIGH';
      const icon = isHigh ? '🔴' : '🟡';
      const iconCls = isHigh ? 'alert-icon-red' : 'alert-icon-amber';
      let title, detail;
      if (al.type === 'EXCESS_FIRES') {
        title = `Excess fires: ${AGENT_LABELS[al.agent]||al.agent} on ${al.date}`;
        detail = `${al.count} fires vs threshold ${al.threshold}/day — ${(al.count/al.threshold).toFixed(1)}x expected`;
      } else {
        title = `Spinning session: ${al.session_name || al.session_id}`;
        detail = `${al.turns} turns, ${al.out_per_turn} tokens/turn avg, cost $${al.cost_usd} — ${al.date}`;
      }
      return `<div class="alert-row">
        <div class="alert-icon ${iconCls}">${icon}</div>
        <div class="alert-body">
          <div class="alert-title">${title}</div>
          <div class="alert-detail">${detail}</div>
        </div>
        <span class="badge ${isHigh?'badge-red':'badge-amber'}">${al.severity}</span>
      </div>`;
    }).join('');
    document.getElementById('alerts-list').innerHTML = alertsHtml;
  }

  // --- Recent sessions table (top 20 by cost, from ledger) ---
  // Note: we don't have the full ledger in the summary JSON, so we show by_agent breakdown only
  // For a richer table, the HTML could fetch token-ledger.jsonl separately
  document.getElementById('sessions-table').innerHTML =
    `<tr><td colspan="6" style="color:var(--muted);text-align:center;padding:16px">
      Session-level detail available in token-ledger.csv (COWORK/projects/SA - SYSTEM OPTIMISATION/token-monitoring/).
      <br>To show live: push token-ledger.jsonl alongside this HTML and add a fetch call.
    </td></tr>`;
}

// Auto-load on page open
loadData();
</script>
</body>
</html>
